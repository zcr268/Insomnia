<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insomnia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <h1>Insomnia</h1>
        <span class="status-dot" id="statusDot"></span>
      </div>
      <span class="status-text" id="statusText">Inactive</span>
    </header>

    <!-- Manual Toggle -->
    <section class="toggle-section">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Keep Awake</div>
          <div class="toggle-sub" id="reasonText">Manually prevent sleep</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="manualToggle">
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <!-- Triggers List -->
    <section class="watchlist-section">
      <div class="watchlist-header">
        <h2>Triggers</h2>
        <button class="btn-add" id="addBtn">+ Add</button>
      </div>
      <div class="watchlist" id="triggerList">
        <div class="watchlist-empty" id="emptyMessage">
          No triggers yet. Tap "+ Add" to get started.
        </div>
      </div>
    </section>

    <footer>
      <span>Insomnia v1.4.2</span>
    </footer>
  </div>

  <!-- Add Drawer Modal -->
  <div class="modal-overlay" id="drawerOverlay">
    <div class="drawer">
      <div class="drawer-header">
        <h2>Add Trigger</h2>
        <button class="btn-close" id="drawerClose">&times;</button>
      </div>

      <!-- Tabs -->
      <div class="drawer-tabs">
        <button class="tab active" data-tab="integrations">Integrations</button>
        <button class="tab" data-tab="apps">Apps</button>
      </div>

      <!-- Integrations Tab -->
      <div class="tab-content active" id="tabIntegrations">
        <div class="drawer-scroll">
          <div class="integration-list" id="integrationList"></div>
        </div>
      </div>

      <!-- Apps Tab -->
      <div class="tab-content" id="tabApps">
        <div class="drawer-search">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search installed apps...">
        </div>
        <div class="drawer-scroll">
          <div class="drawer-loading" id="drawerLoading">
            <div class="spinner"></div>
            <span>Discovering installed apps...</span>
          </div>
          <div class="app-grid" id="appGrid"></div>
        </div>
        <div class="drawer-footer">
          <button class="btn-browse" id="browseBtn">Browse manually...</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
